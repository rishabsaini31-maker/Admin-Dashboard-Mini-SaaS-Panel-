<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>SCS Admin</h2>

      <ul>
        <li>📊 Dashboard</li>
        <li>📈 Analytics</li>
        <li>💳 Transactions</li>
        <li>👥 Users</li>
        <li>⚙️ Settings</li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Topbar -->
      <div class="topbar">
        <h1>Dashboard</h1>
      </div>

      <!-- Cards -->
      <div class="cards">

        <div class="card">
          <h3>Total Revenue</h3>
          <p>₹50,000</p>
        </div>

        <div class="card">
          <h3>Total Users</h3>
          <p>1,250</p>
        </div>

        <div class="card">
          <h3>Expenses</h3>
          <p>₹18,000</p>
        </div>

        <div class="card">
          <h3>Growth</h3>
          <p>+12%</p>
        </div>

      </div>

      <!-- Chart Section -->
      <div class="chart-section">
        <h2>Revenue Analytics</h2>
        <canvas id="revenueChart"></canvas>
      </div>

      <!-- Table Section -->
      <div class="table-section">
        <h2>Recent Transactions</h2>

        <table>
          <tr>
            <th>Name</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>

          <tr>
            <td>Rishab</td>
            <td>₹1200</td>
            <td class="success">Success</td>
          </tr>

          <tr>
            <td>Aman</td>
            <td>₹800</td>
            <td class="pending">Pending</td>
          </tr>

          <tr>
            <td>Priya</td>
            <td>₹2300</td>
            <td class="success">Success</td>
          </tr>

        </table>
      </div>

    </main>

  </div>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
